<svg viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">

<style>

:root{
    --text:#111111;
    --muted:#666666;
    --line:#D9D9D9;
}

@media (prefers-color-scheme: dark){

:root{
    --text:#F5F5F5;
    --muted:#9A9A9A;
    --line:#404040;
}

}

.mono{
font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;}

.draw{
    stroke-dasharray:1000;
    stroke-dashoffset:1000;
    animation:draw 1.2s forwards;
}

.fade{
    opacity:0;
    animation:fade .8s forwards;
}

.d1{animation-delay:.2s;}
.d2{animation-delay:.5s;}
.d3{animation-delay:.8s;}
.d4{animation-delay:1.1s;}
.d5{animation-delay:1.4s;}

@keyframes draw{
    to{stroke-dashoffset:0;}
}

@keyframes fade{
    to{opacity:1;}
}

</style>

<!-- Name -->

<text
class="mono fade d2"
x="40"
y="100"
font-size="60"
fill="var(--text)">
Hi, my name is Shamama.
</text>

<!-- Title -->

<text
class="mono fade d3"
x="40"
y="135"
font-size="18"
fill="var(--text)">
Full Stack Mobile Developer (Flutter &amp; .NET)
</text>

<line
class="draw"
x1="40"
y1="165"
x2="960"
y2="165"
stroke="var(--text)"
stroke-width="1"/>

<!-- Focus -->

<text
class="mono fade d4"
x="40"
y="200"
font-size="16"
letter-spacing="1"
fill="var(--text)">
Flutter - .NET - Firebase - SQL 
</text>

<text
class="mono fade d4"
x="40"
y="220"
font-size="16"
letter-spacing="1"
fill="var(--text)">
building scalable mobile applications from frontend to backend
</text>

<!-- Bottom Line -->

<line
class="draw"
x1="40"
y1="245"
x2="960"
y2="245"
stroke="var(--text)"
stroke-width="5"/>

<!-- Footer -->
<text
class="mono fade d4"
x="40"
y="273"
font-size="16"
letter-spacing="1"
fill="var(--text)">
fun fact I do debates, write sometimes and will be leading a tech community this semester
</text>


</svg>