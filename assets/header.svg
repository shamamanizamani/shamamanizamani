<svg viewBox="0 0 1000 360" xmlns="http://www.w3.org/2000/svg">

<style>

:root{
    --text:#111111;
    --muted:#666666;
    --line:#D9D9D9;
}

@media (prefers-color-scheme: dark){

:root{
    --text:#F5F5F5;
    --muted:#9A9A9A;
    --line:#404040;
}

}

.mono{
font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;}

.draw{
    stroke-dasharray:1000;
    stroke-dashoffset:1000;
    animation:draw 1.2s forwards;
}

.fade{
    opacity:0;
    animation:fade .8s forwards;
}

.d1{animation-delay:.2s;}
.d2{animation-delay:.5s;}
.d3{animation-delay:.8s;}
.d4{animation-delay:1.1s;}
.d5{animation-delay:1.4s;}

@keyframes draw{
    to{stroke-dashoffset:0;}
}

@keyframes fade{
    to{opacity:1;}
}

</style>

<!-- Top Line -->

<line
class="draw"
x1="40"
y1="45"
x2="960"
y2="45"
stroke="var(--line)"
stroke-width="1"/>

<!-- Small Header -->

<text
class="mono fade d1"
x="40"
y="28"
font-size="11"
letter-spacing="3"
fill="var(--text)">
PORTFOLIO — INDEX Nº 001
</text>

<text
class="mono fade d1"
x="960"
y="28"
text-anchor="end"
font-size="11"
letter-spacing="3"
fill="var(--text)">
PAKISTAN
</text>

