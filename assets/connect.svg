<svg viewBox="0 0 1000 80" xmlns="http://www.w3.org/2000/svg">

<style>
:root{
    --text:#F5F5F5;
    --muted:#C8C8C8;
    --line:#6B6B6B;
}

@media (prefers-color-scheme: light){
:root{
    --text:#111111;
    --muted:#555555;
    --line:#CFCFCF;
}
}

.number{
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size:25px;
    font-weight:300;
    fill:var(--text);
}

.title{
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size:25px;
    letter-spacing:8px;
    fill:var(--text);
}

.body{
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size:16px;
    fill:var(--text);
}

.rule{
    stroke:var(--text);
    stroke-width:1.2;
}
</style>

<!-- Header -->




<!-- Heading -->
<text class="number" x="40" y="67">01</text>

<!-- Vertical Divider -->
<line
    x1="88"
    y1="45"
    x2="88"
    y2="78"
    stroke="var(--text)"
    stroke-width="2"
/>

<text class="title" x="105" y="67">
    LET'S CONNECT ON
</text>

<line class="rule" x1="40" y1="78" x2="960" y2="78"/>


</svg>